<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="color-scheme" content="light dark" />
<meta name="supported-color-schemes" content="light dark" />
<title>Sign in</title>
<style>
  :root { color-scheme: light dark; }
  @media (prefers-color-scheme: dark) {
    .bg-wrap { background: #1a1420 !important; }
    .t-head  { color: #8a7f8e !important; }
    .t-h1    { color: #f1ebe2 !important; }
    .t-body  { color: #cdc2b8 !important; }
    .t-foot  { color: #8a7f8e !important; }
    .t-link  { color: #e6c180 !important; }
  }
</style>
</head>
<body class="bg-wrap" style="margin:0;padding:0;background:#faf8f5;color:#1a1420;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table class="bg-wrap" role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf8f5;">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">
          <tr>
            <td style="padding-bottom:24px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;padding-right:12px;">
                    <svg width="34" height="34" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                      <g fill="none" stroke="#cc9b54" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M32 50 C 18 46, 12 36, 14 28 C 22 30, 28 36, 32 50 Z" />
                        <path d="M32 50 C 46 46, 52 36, 50 28 C 42 30, 36 36, 32 50 Z" />
                        <path d="M32 50 C 30 38, 28 26, 32 14 C 36 26, 34 38, 32 50 Z" />
                        <path d="M32 50 C 24 44, 20 34, 22 22 C 28 30, 30 40, 32 50 Z" />
                        <path d="M32 50 C 40 44, 44 34, 42 22 C 36 30, 34 40, 32 50 Z" />
                      </g>
                    </svg>
                  </td>
                  <td style="vertical-align:middle;line-height:1.05;">
                    <div class="t-head" style="font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#7a6b8f;opacity:0.8;">
                      Saurabh Dada&rsquo;s
                    </div>
                    <div class="t-h1" style="font-family:Georgia,'Times New Roman',serif;font-size:18px;color:#1a1420;letter-spacing:-0.01em;">
                      Guru<span style="color:#cc9b54;">paurnima</span>
                    </div>
                    <div class="t-head" style="font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:#7a6b8f;opacity:0.8;">
                      2026
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;">
              <div class="t-h1" style="font-family:Georgia,'Times New Roman',serif;font-size:42px;line-height:1.05;color:#1a1420;">
                Welcome back.
              </div>
            </td>
          </tr>
          <tr>
            <td class="t-body" style="color:#4a3f55;font-size:15px;line-height:1.6;padding-bottom:32px;">
              Click below to sign in. The link is good for the next hour.
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:48px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;border-radius:999px;background:#cc9b54;color:#1a1420;text-decoration:none;font-weight:500;letter-spacing:0.04em;">
                Sign in →
              </a>
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid rgba(204,155,84,0.25);padding-top:16px;font-size:11px;line-height:1.6;">
              <span class="t-foot" style="color:#7a6b8f;">Or paste this into your browser:</span><br />
              <span class="t-link" style="color:#8a4a00;word-break:break-all;">{{ .ConfirmationURL }}</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
